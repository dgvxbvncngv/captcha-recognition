<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 验证码识别系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%; max-width: 400px; padding: 40px;
        }
        h1 { color: #2d3748; font-size: 24px; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #718096; text-align: center; margin-bottom: 28px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; font-size: 14px; margin-bottom: 6px; font-weight: 500; }
        input {
            width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn {
            width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 8px; transition: transform 0.15s;
        }
        .btn:hover { transform: translateY(-1px); }
        .error { color: #e53e3e; background: #fed7d7; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; text-align: center; }
        .links { text-align: center; margin-top: 20px; font-size: 13px; color: #718096; }
        .links a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>登录</h1>
        <p class="subtitle">验证码识别系统</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="links">还没账号？ <a href="/register">立即注册</a> · <a href="/">返回首页</a></div>
    </div>
</body>
</html>
