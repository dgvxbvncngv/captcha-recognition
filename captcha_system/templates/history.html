<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - 验证码识别系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .navbar {
            background: rgba(255,255,255,0.95); border-radius: 12px; padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .nav-brand { font-weight: 700; color: #2d3748; font-size: 18px; }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-links a { color: #4a5568; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; transition: all 0.2s; }
        .nav-links a:hover { background: #edf2f7; color: #667eea; }
        .nav-user { color: #718096; font-size: 13px; }
        .container { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 1100px; margin: 0 auto; padding: 30px; }
        h1 { color: #2d3748; font-size: 22px; margin-bottom: 20px; }
        .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: end; }
        .filters label { display: block; color: #4a5568; font-size: 12px; margin-bottom: 4px; }
        .filters input, .filters select {
            padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px;
        }
        .btn-small { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-small:hover { background: #5a67d8; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f7fafc; color: #4a5568; padding: 10px; text-align: left; font-size: 13px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 13px; color: #2d3748; }
        tr:hover { background: #f7fafc; }
        .thumb { width: 80px; height: 32px; object-fit: contain; border: 1px solid #e2e8f0; border-radius: 4px; background: #f7fafc; }
        .pred { font-family: "Consolas", monospace; font-weight: 600; color: #667eea; }
        .conf { color: #718096; }
        .empty { text-align: center; color: #a0aec0; padding: 40px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">验证码识别系统</div>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/history">历史记录</a>
            <a href="/stats">统计分析</a>
            {% if user.role == 'admin' %}<a href="/logs">系统日志</a>{% endif %}
            <span class="nav-user">{{ user.username }}（{{ '管理员' if user.role == 'admin' else '用户' }}）</span>
            <a href="/logout">登出</a>
        </div>
    </div>

    <div class="container">
        <h1>识别历史记录</h1>
        <div class="filters">
            <div>
                <label>开始日期</label>
                <input type="date" id="fStart">
            </div>
            <div>
                <label>结束日期</label>
                <input type="date" id="fEnd">
            </div>
            <div>
                <label>条数</label>
                <select id="fLimit">
                    <option value="50">50</option><option value="100">100</option><option value="200">200</option>
                </select>
            </div>
            {% if user.role == 'admin' %}
            <div>
                <label>范围</label>
                <select id="fScope"><option value="self">仅自己</option><option value="all">全部用户</option></select>
            </div>
            {% endif %}
            <button class="btn-small" onclick="loadHistory()">查询</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th><th>图片</th><th>识别结果</th><th>置信度</th>
                    <th>时间</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="5" class="empty">点击查询加载...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadHistory() {
            const params = new URLSearchParams();
            const start = document.getElementById('fStart').value;
            const end = document.getElementById('fEnd').value;
            const limit = document.getElementById('fLimit').value;
            if (start) params.set('start', start);
            if (end) params.set('end', end + ' 23:59:59');
            params.set('limit', limit);

            const scope = document.getElementById('fScope');
            if (scope && scope.value === 'all') params.set('all', '1');

            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '<tr><td colspan="5" class="empty">加载中...</td></tr>';

            try {
                const r = await fetch(`/api/history?${params}`);
                if (r.status === 401) { location.href = '/login'; return; }
                const data = await r.json();
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无记录</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(row => `
                    <tr>
                        <td>${row.id}</td>
                        <td><img class="thumb" src="/api/history/image/${row.id}" alt="图片"></td>
                        <td class="pred">${row.predicted_text || '-'}</td>
                        <td class="conf">${(row.confidence * 100).toFixed(2)}%</td>
                        <td>${row.created_at}</td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty">加载失败: ${e.message}</td></tr>`;
            }
        }
        loadHistory();
    </script>
</body>
</html>
