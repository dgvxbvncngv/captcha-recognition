<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 验证码识别系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .navbar {
            background: rgba(255,255,255,0.95); border-radius: 12px; padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .nav-brand { font-weight: 700; color: #2d3748; font-size: 18px; }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-links a { color: #4a5568; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; transition: all 0.2s; }
        .nav-links a:hover { background: #edf2f7; color: #667eea; }
        .nav-user { color: #718096; font-size: 13px; }
        .container { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 1100px; margin: 0 auto; padding: 30px; }
        h1 { color: #2d3748; font-size: 22px; margin-bottom: 20px; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: end; }
        .controls label { display: block; color: #4a5568; font-size: 12px; margin-bottom: 4px; }
        .controls select { padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; }
        .btn-small { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-small:hover { background: #5a67d8; }
        .stats-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #f7fafc; border-radius: 10px; padding: 20px; text-align: center; border-left: 4px solid #667eea; }
        .stat-label { color: #718096; font-size: 13px; margin-bottom: 6px; }
        .stat-value { color: #2d3748; font-size: 28px; font-weight: 700; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: #f7fafc; border-radius: 10px; padding: 20px; }
        .chart-box h3 { color: #4a5568; font-size: 15px; margin-bottom: 12px; }
        .chart-box canvas { max-height: 280px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">验证码识别系统</div>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/history">历史记录</a>
            <a href="/stats">统计分析</a>
            {% if user.role == 'admin' %}<a href="/logs">系统日志</a>{% endif %}
            <span class="nav-user">{{ user.username }}（{{ '管理员' if user.role == 'admin' else '用户' }}）</span>
            <a href="/logout">登出</a>
        </div>
    </div>

    <div class="container">
        <h1>统计分析</h1>
        <div class="controls">
            <div>
                <label>时间范围</label>
                <select id="fDays">
                    <option value="7">最近 7 天</option>
                    <option value="30" selected>最近 30 天</option>
                    <option value="90">最近 90 天</option>
                    <option value="365">最近一年</option>
                </select>
            </div>
            {% if user.role == 'admin' %}
            <div>
                <label>范围</label>
                <select id="fScope"><option value="self">仅自己</option><option value="all" selected>全部用户</option></select>
            </div>
            {% endif %}
            <button class="btn-small" onclick="loadStats()">刷新</button>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-label">识别总数</div>
                <div class="stat-value" id="sTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均置信度</div>
                <div class="stat-value" id="sConf">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">正确识别数</div>
                <div class="stat-value" id="sCorrect">0</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-box">
                <h3>每日识别数量趋势</h3>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>验证码类型分布</h3>
                <canvas id="typeChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let trendChart = null, typeChart = null;

        async function loadStats() {
            const days = document.getElementById('fDays').value;
            const scope = document.getElementById('fScope');
            const params = new URLSearchParams({ days });
            if (scope && scope.value === 'all') params.set('all', '1');

            try {
                const r = await fetch(`/api/stats?${params}`);
                if (r.status === 401) { location.href = '/login'; return; }
                const data = await r.json();

                const overall = data.overall || {};
                document.getElementById('sTotal').textContent = overall.total || 0;
                document.getElementById('sConf').textContent = overall.avg_conf ? (overall.avg_conf * 100).toFixed(1) + '%' : '0%';
                document.getElementById('sCorrect').textContent = overall.correct || 0;

                drawTrend(data.daily || []);
                drawType(data.type_distribution || []);
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        function drawTrend(daily) {
            const ctx = document.getElementById('trendChart');
            if (trendChart) trendChart.destroy();
            const labels = daily.map(d => d.day);
            const counts = daily.map(d => d.count);
            const confs = daily.map(d => d.avg_conf ? (d.avg_conf * 100).toFixed(1) : 0);
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: '识别数量', data: counts, borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.1)', tension: 0.3, yAxisID: 'y' },
                        { label: '平均置信度(%)', data: confs, borderColor: '#38b2ac', backgroundColor: 'rgba(56,178,172,0.1)', tension: 0.3, yAxisID: 'y1' },
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, position: 'left', title: { display: true, text: '数量' } },
                        y1: { beginAtZero: true, max: 100, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '置信度%' } }
                    }
                }
            });
        }

        function drawType(dist) {
            const ctx = document.getElementById('typeChart');
            if (typeChart) typeChart.destroy();
            typeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: dist.map(d => d.captcha_type || '未知'),
                    datasets: [{
                        data: dist.map(d => d.count),
                        backgroundColor: ['#667eea', '#764ba2', '#48bb78', '#ed8936', '#e53e3e'],
                    }]
                },
                options: { responsive: true }
            });
        }

        loadStats();
    </script>
</body>
</html>
